<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      overflow: hidden;
    }
    h1 {
      font-size: 96px;
      font-weight: 700;
      color: #E91E9E;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }
    p {
      font-size: 36px;
      color: #eee;
    }
    p span {
      color: #84FF00;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <h1>RadioFAF</h1>
  <p>Don't follow. <span>Tune in.</span></p>
</body>
</html>
